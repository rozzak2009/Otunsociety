<!DOCTYPE html>
<html lang="id">

<head>

        </div>

            <div class="settings-group">
                <label>Appearance</label>
                <button id="theme-toggle-sidebar" class="settings-item">
                    <i class="ri-sun-fill"></i>
                    <span>Change Brightness</span>
                </button>
            </div>
            <!-- Future settings can go here -->
        </div>
    </div>

    <!-- Floating Settings Toggle -->
    <button id="settings-toggle" class="settings-btn" aria-label="Open Settings">
        <i class="ri-settings-4-line"></i>
    </button>

    <!-- Premium Navigation -->
    <div class="nav-wrapper">
        <nav class="navbar" id="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-logo">
                    <img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                    <span class="logo-text">OTUN<span>SOCIETY</span></span>

                    <li><a href="partners.html" class="active">Partners</a></li>
                    <li><a href="index.html#gallery">Featured Edits</a></li>
                </ul>
                <div class="nav-controls">
                    <!-- Moved to Settings Sidebar -->
                    <div class="menu-toggle" id="mobile-menu">
                        <i class="ri-menu-3-line"></i>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <!-- Partners Header -->
    <header class="partners-hero">
        <div class="hero-overlay"></div>
        <div class="section-container">
            <div class="section-title fade-up">
                <h1>CO-<span class="highlight">OPERATED</span></h1>
                <p>Establishing alliances across the premium editing community.</p>
            </div>
        </div>
    </header>

    <!-- Partners Grid Section -->
    <section class="partners-section">
        <div class="section-container">
            <div class="partners-grid" id="partners-container">
                <!-- Dynamically generated with JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <h2 class="footer-logo">OTUN<span>SOCIETY</span></h2>

            <div class="social-links">
                <a href="https://www.tiktok.com/@otunsociety" target="_blank"><i class="ri-instagram-line"></i></a>
